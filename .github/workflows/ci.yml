name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies (exclude pyodbc)
        run: |
          python -m pip install --upgrade pip
          if [ -f csv2sql/requirements.txt ]; then
            grep -v '^pyodbc' csv2sql/requirements.txt > .ci_requirements.txt || true
            pip install -r .ci_requirements.txt pytest flake8
          else
            pip install pytest flake8
          fi

      - name: Compile check
        run: python -m compileall -q csv2sql || true

      - name: Lint (flake8)
        run: |
          if command -v flake8 >/dev/null 2>&1; then
            flake8 csv2sql || true
          else
            echo "flake8 not installed"
          fi

      - name: Run tests (if present)
        run: |
          if [ -d tests ] || ls | grep -qE "test_.*\\.py|tests"; then
            pytest -q
          else
            echo "No tests found, skipping."
          fi
